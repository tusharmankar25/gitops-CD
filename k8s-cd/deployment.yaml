apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app
  namespace: node-js
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs-app
  template:
    metadata:
      labels:
        app: nodejs-app
    spec:
      containers:
      - name: nodejs-app
        image: tusharacr.azurecr.io/nodejs-app:latest
        ports:
        - containerPort: 3000
      # Add this block to authenticate using the secret you just created
      imagePullSecrets:
      - name: acr-auth
